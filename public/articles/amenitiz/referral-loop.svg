<svg viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="400" fill="#FAFAF8" rx="12"/>
  <text x="260" y="32" text-anchor="middle" font-family="Inter, system-ui" font-size="13" font-weight="600" fill="#C4703E" letter-spacing="1.5">REFERRAL LOOP</text>
  <rect x="170" y="52" width="180" height="52" rx="8" fill="#1A1A1A"/>
  <text x="260" y="74" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#FAFAF8">Hotelero usa Amenitiz</text>
  <text x="260" y="92" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#999">+ocupación, -comisiones OTA</text>
  <path d="M350 78 L420 78 L420 155" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="430" y="120" font-family="Inter, system-ui" font-size="9" fill="#888">ve resultados</text>
  <rect x="310" y="155" width="190" height="52" rx="8" fill="white" stroke="#e5e5e3" stroke-width="1.5"/>
  <text x="405" y="177" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#1A1A1A">Comparte en</text>
  <text x="405" y="195" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#C4703E">The Hotel Club</text>
  <path d="M405 207 L405 260" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="415" y="238" font-family="Inter, system-ui" font-size="9" fill="#888">confianza entre pares</text>
  <rect x="295" y="260" width="220" height="52" rx="8" fill="white" stroke="#e5e5e3" stroke-width="1.5"/>
  <text x="405" y="282" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#1A1A1A">Otro hotelero ve números</text>
  <text x="405" y="300" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#888">y pide referencia</text>
  <path d="M295 290 L140 290 L140 260" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="80" y="280" font-family="Inter, system-ui" font-size="9" fill="#888">incentivo:</text>
  <text x="80" y="292" font-family="Inter, system-ui" font-size="9" fill="#888">mes gratis</text>
  <rect x="30" y="200" width="220" height="52" rx="8" fill="white" stroke="#e5e5e3" stroke-width="1.5"/>
  <text x="140" y="222" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#1A1A1A">Nuevo hotelero se registra</text>
  <text x="140" y="240" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#C4703E">CAC ~ 0</text>
  <path d="M140 200 L140 130 L170 105" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="60" y="165" font-family="Inter, system-ui" font-size="9" fill="#888">repite el ciclo</text>
  <rect x="185" y="340" width="150" height="36" rx="18" fill="#C4703E"/>
  <text x="260" y="363" text-anchor="middle" font-family="Inter, system-ui" font-size="11" font-weight="600" fill="white">Soporte excepcional</text>
  <text x="260" y="390" text-anchor="middle" font-family="Inter, system-ui" font-size="9" fill="#888">el diferenciador que alimenta el boca a boca</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C4703E"/>
    </marker>
  </defs>
</svg>
