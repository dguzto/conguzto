<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="420" fill="#FAFAF8" rx="12"/>
  <text x="260" y="32" text-anchor="middle" font-family="Inter, system-ui" font-size="13" font-weight="600" fill="#C4703E" letter-spacing="1.5">SPENDING BENCHMARKS LOOP</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C4703E"/>
    </marker>
  </defs>
  <rect x="155" y="50" width="210" height="52" rx="8" fill="#1A1A1A"/>
  <text x="260" y="72" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#FAFAF8">Payhawk procesa gasto</text>
  <text x="260" y="90" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#999">$3.2B en volumen de pagos</text>
  <path d="M365 76 L440 76 L440 145" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
