  <text x="260" y="390" text-anchor="middle" font-family="Inter, system-ui" font-size="9" fill="#888">más empresas = mejores benchmarks = más difícil de copiar</text>
  <rect x="30" y="340" width="100" height="30" rx="6" fill="#f5f0eb" stroke="#e5e5e3" stroke-width="1"/>
  <text x="80" y="358" text-anchor="middle" font-family="Inter, system-ui" font-size="9" fill="#888">Ramp lo hace en US</text>
  <text x="80" y="370" text-anchor="middle" font-family="Inter, system-ui" font-size="9" fill="#C4703E">Europa = vacío</text>
