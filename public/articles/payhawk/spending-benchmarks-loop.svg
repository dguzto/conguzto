  <text x="415" y="167" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#1A1A1A">Publica benchmarks</text>
  <text x="415" y="185" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#888">por industria, tamaño, país</text>
  <path d="M415 197 L415 245" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="425" y="225" font-family="Inter, system-ui" font-size="9" fill="#888">SEO + LinkedIn</text>
  <rect x="290" y="245" width="250" height="52" rx="8" fill="white" stroke="#e5e5e3" stroke-width="1.5"/>
  <text x="415" y="267" text-anchor="middle" font-family="Inter, system-ui" font-size="12" font-weight="600" fill="#1A1A1A">Finance controller encuentra</text>
  <text x="415" y="285" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#888">buscando datos para su presupuesto</text>
  <path d="M290 275 L140 275 L140 245" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="265" font-family="Inter, system-ui" font-size="9" fill="#888">descarga reporte = lead</text>
  <rect x="30" y="190" width="220" height="52" rx="8" fill="white" stroke="#e5e5e3" stroke-width="1.5"/>
