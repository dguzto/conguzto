  <text x="140" y="230" text-anchor="middle" font-family="Inter, system-ui" font-size="10" fill="#C4703E">se registra como cliente</text>
  <path d="M140 190 L140 130 L155 100" stroke="#C4703E" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="60" y="158" font-family="Inter, system-ui" font-size="9" fill="#888">más data = mejor loop</text>
  <rect x="145" y="340" width="230" height="36" rx="18" fill="#C4703E"/>
